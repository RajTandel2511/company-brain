# Company Brain — GCP VM deployment for one-time extraction burst.
#
# Runs ONLY the worker + rag_worker. Backend + frontend stay on the Synology.
# The VM mounts NAS shares over Tailscale → SMB and extracts at full speed,
# then the resulting docintel.sqlite is rsync'd back to Synology.
#
# Usage:
#   cd /home/ubuntu/company-brain
#   sudo docker compose -f docker-compose.gcp.yml up -d --build
#
# Tear-down:
#   sudo docker compose -f docker-compose.gcp.yml down
#
# Host prerequisites (see scripts/gcp/bootstrap.sh + mount_nas.sh):
#   - Docker + docker compose plugin
#   - Tailscale connected to the same tailnet as the Synology
#   - SMB shares mounted read-only under /mnt/nas/<Share>/

services:
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: company-brain:gcp
    container_name: company-brain-worker
    env_file: .env
    environment:
      - NAS_ROOT=/mnt/nas
      - TZ=America/Los_Angeles
      # 44 vCPU machine, Python GIL releases on OCR/C code, but SQLite writes
      # serialize. 24 workers is the sweet spot — beyond this the commit lock
      # becomes the bottleneck and extra threads just wait.
      - EXTRACT_WORKERS=24
      # Spectrum SQL is on the office LAN and not reachable from this cloud
      # VM. Skip master-data loading → entity tagging is bypassed during the
      # burst. The Synology re-tags existing files on handoff (fast, all
      # text is already extracted).
      - SKIP_SPECTRUM=1
      # The stat()-per-file NAS walk is ~50ms per call over Tailscale SMB,
      # which on 500k files is several hours of pure I/O wait. Skip it — the
      # nas-index.sqlite we rsync'd from Synology is already fresh, and any
      # genuinely new files can be caught up later on Synology.
      - SKIP_NAS_REFRESH=1
      # Local SSD staging — bulk-copy each batch from Tailscale-SMB to a
      # local cache, then extract from the cache. Without this, all 24
      # extraction threads stall on per-file SMB latency and we use ~1
      # core out of 44. With it, the network gets saturated once per batch
      # (parallel cp), then OCR runs full-tilt on local disk.
      - EXTRACT_PREFETCH=1
      - EXTRACT_PREFETCH_WORKERS=48
      - EXTRACT_CACHE_DIR=/var/cache/extract
    volumes:
      - ./data:/app/data
      # NAS shares — SMB-mounted on the host. Same names as Synology so the
      # existing nas-index.sqlite paths resolve correctly after handoff.
      - /mnt/nas/Accounting:/mnt/nas/Accounting:ro
      - /mnt/nas/AI_RAG_Data:/mnt/nas/AI_RAG_Data:ro
      - /mnt/nas/All_Air_Users:/mnt/nas/All_Air_Users:ro
      - /mnt/nas/Common_Submittals:/mnt/nas/Common_Submittals:ro
      - /mnt/nas/Current_Bids:/mnt/nas/Current_Bids:ro
      - /mnt/nas/Employee_Resources:/mnt/nas/Employee_Resources:ro
      - /mnt/nas/Estimation:/mnt/nas/Estimation:ro
      - /mnt/nas/Foremen_Portal:/mnt/nas/Foremen_Portal:ro
      - /mnt/nas/Forms:/mnt/nas/Forms:ro
      - /mnt/nas/Inventory:/mnt/nas/Inventory:ro
      - /mnt/nas/Miscallaneous:/mnt/nas/Miscallaneous:ro
      - /mnt/nas/Office_Use_Only:/mnt/nas/Office_Use_Only:ro
      - /mnt/nas/Projects:/mnt/nas/Projects:ro
      - /mnt/nas/Service_Tech_Portal:/mnt/nas/Service_Tech_Portal:ro
      - /mnt/nas/Service_Dept:/mnt/nas/Service_Dept:ro
      - /mnt/nas/Trial-1:/mnt/nas/Trial-1:ro
      # Local SSD staging dir for the prefetch path. Sized for ~5 GB rolling
      # batches (200 files × ~5 MB avg, 4-5x headroom). Lives on the VM's
      # /var/cache so it survives container restarts but not VM teardown.
      - /var/cache/extract:/var/cache/extract
    command: ["python", "scripts/extract_worker.py"]
    restart: unless-stopped
    mem_limit: 48g
    # No cpu_shares cap — use every core we can. The VM exists solely for
    # this workload; there's no DSM-like responsiveness to preserve.
    networks: [brain]

  rag_worker:
    image: company-brain:gcp
    depends_on:
      worker: { condition: service_started }
    container_name: company-brain-rag
    env_file: .env
    environment:
      - NAS_ROOT=/mnt/nas
      - TZ=America/Los_Angeles
      - HF_HOME=/app/data/hf
      - FASTEMBED_CACHE_PATH=/app/data/hf/fastembed
      # On the 88-core host we can give ONNX more threads for embeddings.
      - OMP_NUM_THREADS=8
      - ORT_NUM_THREADS=8
    volumes:
      - ./data:/app/data
    command: ["python", "scripts/build_rag.py"]
    restart: unless-stopped
    mem_limit: 16g
    networks: [brain]

networks:
  brain:
    driver: bridge
